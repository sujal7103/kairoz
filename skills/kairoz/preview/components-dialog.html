<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="width:700px; overflow:hidden;"><div style="padding:20px;">
  <div class="kairoz-dialog" style="max-width:460px; margin:0 auto;">
    <div class="kairoz-dialog-header">
      <div class="kairoz-dialog-title">Delete project</div>
      <div class="kairoz-dialog-desc">This action is irreversible. The project and all of its deployments will be permanently removed.</div>
    </div>
    <div class="kairoz-dialog-body">
      <label style="display:block; font-size:11px; color:#aaa; margin-bottom:4px;">Type <span class="mono" style="color:#fff;">kairoz-prod</span> to confirm</label>
      <input class="kairoz-input" placeholder="kairoz-prod" />
    </div>
    <div class="kairoz-dialog-footer">
      <button class="kairoz-btn kairoz-btn-ghost">Cancel</button>
      <button class="kairoz-btn kairoz-btn-destructive">Delete project</button>
    </div>
  </div>
</div></body></html>
