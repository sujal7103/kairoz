<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="width:700px; overflow:hidden;"><div style="padding:16px 20px; display:flex; flex-direction:column; gap:8px; align-items:flex-start;">
  <div class="kairoz-toast">
    <span class="kairoz-dot kairoz-dot-success"></span>
    <div><div>Project deployed</div><div class="kairoz-toast-desc">kairoz-app.vercel.app is live</div></div>
    <span class="kairoz-toast-close">✕</span>
  </div>
  <div class="kairoz-toast">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6796E6" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg>
    <div><div>Invitation sent to 3 members</div><div class="kairoz-toast-desc">They'll receive an email shortly</div></div>
    <span class="kairoz-toast-close">✕</span>
  </div>
  <div class="kairoz-toast">
    <span class="kairoz-dot kairoz-dot-error"></span>
    <div>Copied to clipboard</div>
    <kbd class="kairoz-kbd" style="margin-left:auto;">⌘ Z</kbd>
  </div>
</div></body></html>
