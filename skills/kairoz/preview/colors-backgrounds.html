<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="width:700px; overflow:hidden;"><div style="padding:20px 24px;">
  <div style="display:grid; grid-template-columns:repeat(6,1fr); gap:8px;">
    <div style="height:72px; background:#000; border:1px solid #1e1e1e; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px;"><span style="font-size:10px; font-weight:600;">base</span><span class="mono" style="font-size:9px; color:#777;">#000000</span></div>
    <div style="height:72px; background:#0a0a0a; border:1px solid #1e1e1e; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px;"><span style="font-size:10px; font-weight:600;">input</span><span class="mono" style="font-size:9px; color:#777;">#0a0a0a</span></div>
    <div style="height:72px; background:#0f0f0f; border:1px solid #1e1e1e; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px;"><span style="font-size:10px; font-weight:600;">raised</span><span class="mono" style="font-size:9px; color:#777;">#0f0f0f</span></div>
    <div style="height:72px; background:#171717; border:1px solid #1e1e1e; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px;"><span style="font-size:10px; font-weight:600;">tab active</span><span class="mono" style="font-size:9px; color:#777;">#171717</span></div>
    <div style="height:72px; background:rgba(255,255,255,0.04); border:1px solid #1e1e1e; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px;"><span style="font-size:10px; font-weight:600;">hover</span><span class="mono" style="font-size:9px; color:#777;">wh / .04</span></div>
    <div style="height:72px; background:rgba(255,255,255,0.08); border:1px solid #1e1e1e; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px;"><span style="font-size:10px; font-weight:600;">active</span><span class="mono" style="font-size:9px; color:#777;">wh / .08</span></div>
  </div>
  <div style="margin-top:12px; font-size:10px; color:#777;">Flat AMOLED stack. Raised surfaces cap at #0f0f0f — never true dark gray.</div>
</div></body></html>
