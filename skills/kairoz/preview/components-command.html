<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="width:700px; overflow:hidden;"><div style="padding:16px;">
  <div class="kairoz-command" style="max-width:540px; margin:0 auto;">
    <div class="kairoz-command-input-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><line x1="16" y1="16" x2="21" y2="21"/></svg>
      <input class="kairoz-command-input" placeholder="Type a command or search…" value="" />
      <kbd class="kairoz-kbd">esc</kbd>
    </div>
    <div class="kairoz-command-group-label">Suggestions</div>
    <div class="kairoz-command-item is-active">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 2 7 12 12 22 7 12 2"/></svg>
      New project
      <kbd class="kairoz-kbd kairoz-command-item-shortcut">⌘ N</kbd>
    </div>
    <div class="kairoz-command-item">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      Redeploy latest
      <kbd class="kairoz-kbd kairoz-command-item-shortcut">⌘ R</kbd>
    </div>
    <div class="kairoz-command-group-label">Navigate</div>
    <div class="kairoz-command-item">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      Go to deployments
    </div>
    <div class="kairoz-command-item">

      Open settings

  </div>
</div></body></html>
