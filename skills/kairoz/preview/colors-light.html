<!doctype html><html data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="width:700px; overflow:hidden; background:#fff;"><div style="padding:16px 20px; display:flex; flex-direction:column; gap:12px;">
  <div style="display:grid; grid-template-columns:repeat(6,1fr); gap:6px;">
    <div style="height:48px; background:#ffffff; border:1px solid #e4e4e7; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:4px 6px;"><span style="font-size:9px; font-weight:600; color:#0a0a0a;">base</span><span class="mono" style="font-size:9px; color:#71717a;">#ffffff</span></div>
    <div style="height:48px; background:#fafafa; border:1px solid #e4e4e7; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:4px 6px;"><span style="font-size:9px; font-weight:600; color:#0a0a0a;">raised</span><span class="mono" style="font-size:9px; color:#71717a;">#fafafa</span></div>
    <div style="height:48px; background:#f4f4f5; border:1px solid #e4e4e7; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:4px 6px;"><span style="font-size:9px; font-weight:600; color:#0a0a0a;">muted</span><span class="mono" style="font-size:9px; color:#71717a;">#f4f4f5</span></div>
    <div style="height:48px; background:#e4e4e7; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:4px 6px;"><span style="font-size:9px; font-weight:600; color:#0a0a0a;">border</span><span class="mono" style="font-size:9px; color:#52525b;">#e4e4e7</span></div>
    <div style="height:48px; background:#0a0a0a; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:4px 6px;"><span style="font-size:9px; font-weight:600; color:#fff;">primary</span><span class="mono" style="font-size:9px; color:#d4d4d8;">#0a0a0a</span></div>
    <div style="height:48px; background:#0070f3; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:4px 6px;"><span style="font-size:9px; font-weight:600; color:#fff;">highlight</span><span class="mono" style="font-size:9px; color:#d0e8ff;">#0070f3</span></div>
  </div>
  <div style="display:flex; gap:6px; align-items:center; flex-wrap:wrap;">
    <button class="kairoz-btn kairoz-btn-primary">Primary</button>
    <button class="kairoz-btn kairoz-btn-secondary">Secondary</button>
    <button class="kairoz-btn kairoz-btn-ghost">Ghost</button>
    <input class="kairoz-input" placeholder="Search…" style="width:140px;" />
    <span class="kairoz-badge kairoz-badge-info">LIGHT</span>
    <span class="kairoz-pill">region-a</span>
    <kbd class="kairoz-kbd">⌘ K</kbd>
  </div>
  <div style="font-size:10px; color:#71717a;">Toggle via <code class="mono" style="color:#0a0a0a;">&lt;html data-theme="light"&gt;</code> or <code class="mono" style="color:#0a0a0a;">.light</code> class. All tokens invert; blue highlight stays constant across modes.</div>
</div></body></html>
