<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="width:700px; overflow:hidden;"><div style="padding:20px 24px;">
  <div style="display:flex; flex-direction:column; gap:10px;">
    <div style="display:flex; gap:8px; align-items:center;">
      <input class="kairoz-input" value="Value text" style="width:180px;" />
      <input class="kairoz-input" placeholder="Search…" style="width:200px;" />
      <input class="kairoz-input" value="focused" style="border-color:#3d3d3d; width:140px;" />
      <input class="kairoz-input kairoz-input-sm" value="small" style="width:120px;" />
    </div>
    <div style="display:flex; gap:12px; align-items:center;">
      <select class="kairoz-input" style="width:160px; height:24px;"><option>Option A</option></select>
      <label style="display:flex; gap:6px; align-items:center; font-size:11px; color:#aaa;"><input type="checkbox" class="kairoz-check" checked/>Checkbox</label>
      <label style="display:flex; gap:6px; align-items:center; font-size:11px; color:#aaa;"><input type="radio" name="r" class="kairoz-check" checked/>Radio</label>
      <div class="kairoz-switch is-on"></div>
      <div class="kairoz-switch"></div>
    </div>
  </div>
</div></body></html>
