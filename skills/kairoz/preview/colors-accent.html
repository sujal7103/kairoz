<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="width:700px; overflow:hidden;"><div style="padding:20px 24px;">
  <div style="display:grid; grid-template-columns:repeat(5,1fr); gap:8px;">
    <div style="height:72px; background:#ededed; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px;"><span style="font-size:10px; font-weight:600; color:#000;">primary</span><span class="mono" style="font-size:9px; color:#555;">#ededed</span></div>
    <div style="height:72px; background:#ffffff; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px;"><span style="font-size:10px; font-weight:600; color:#000;">primary hover</span><span class="mono" style="font-size:9px; color:#555;">#ffffff</span></div>
    <div style="height:72px; background:#0070f3; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px;"><span style="font-size:10px; font-weight:600; color:#fff;">highlight</span><span class="mono" style="font-size:9px; color:#d0e8ff;">#0070f3</span></div>
    <div style="height:72px; background:#3291ff; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px;"><span style="font-size:10px; font-weight:600; color:#fff;">highlight hover</span><span class="mono" style="font-size:9px; color:#d8eaff;">#3291ff</span></div>
    <div style="height:72px; background:rgba(0,112,243,0.12); border:1px solid rgba(0,112,243,0.3); border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px;"><span style="font-size:10px; font-weight:600; color:#0070f3;">highlight muted</span><span class="mono" style="font-size:9px; color:#777;">0070f3 / .12</span></div>
  </div>
  <div style="margin-top:12px; font-size:10px; color:#777;">Near-white primary for surfaces/buttons. Blue is reserved for focus rings, links, and selected-row accents.</div>
</div></body></html>
