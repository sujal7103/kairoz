<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="width:700px; overflow:hidden;"><div style="padding:20px 24px;">
  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;">
    <div style="border-radius:4px; border:1px solid #1e1e1e; background:rgba(77,77,77,0.12); padding:10px;">
      <div style="display:flex; gap:6px; align-items:center;"><span class="kairoz-dot kairoz-dot-success"></span><span style="font-size:11px; font-weight:600; color:#aaa;">Success</span></div>
      <div class="mono" style="color:#777; margin-top:4px; font-size:11px;">#4d4d4d</div>
    </div>
    <div style="border-radius:4px; border:1px solid #1e1e1e; background:rgba(205,151,49,0.12); padding:10px;">
      <div style="display:flex; gap:6px; align-items:center;"><span class="kairoz-dot kairoz-dot-warning"></span><span style="font-size:11px; font-weight:600; color:#CD9731;">Warning</span></div>
      <div class="mono" style="color:#777; margin-top:4px; font-size:11px;">#CD9731</div>
    </div>
    <div style="border-radius:4px; border:1px solid #1e1e1e; background:rgba(244,71,71,0.12); padding:10px;">
      <div style="display:flex; gap:6px; align-items:center;"><span class="kairoz-dot kairoz-dot-error"></span><span style="font-size:11px; font-weight:600; color:#F44747;">Error</span></div>
      <div class="mono" style="color:#777; margin-top:4px; font-size:11px;">#F44747</div>
    </div>
    <div style="border-radius:4px; border:1px solid #1e1e1e; background:rgba(103,150,230,0.12); padding:10px;">
      <div style="display:flex; gap:6px; align-items:center;"><span class="kairoz-dot kairoz-dot-info"></span><span style="font-size:11px; font-weight:600; color:#6796E6;">Info</span></div>
      <div class="mono" style="color:#777; margin-top:4px; font-size:11px;">#6796E6</div>
    </div>
  </div>
</div></body></html>
