<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="width:700px; overflow:hidden;"><div style="padding:20px 24px;">
  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px;">
    <div style="height:72px; background:#0f0f0f; border:1px solid #141414; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px;"><span style="font-size:10px; font-weight:600;">subtle</span><span class="mono" style="font-size:9px; color:#777;">#141414</span></div>
    <div style="height:72px; background:#0f0f0f; border:1px solid #1e1e1e; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px;"><span style="font-size:10px; font-weight:600;">default</span><span class="mono" style="font-size:9px; color:#777;">#1e1e1e</span></div>
    <div style="height:72px; background:#0f0f0f; border:1px solid #3d3d3d; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px;"><span style="font-size:10px; font-weight:600;">strong</span><span class="mono" style="font-size:9px; color:#777;">#3d3d3d</span></div>
    <div style="height:72px; background:#0f0f0f; outline:1px solid #3d3d3d; outline-offset:1px; border:1px solid #1e1e1e; border-radius:4px; display:flex; flex-direction:column; justify-content:flex-end; padding:6px 8px;"><span style="font-size:10px; font-weight:600;">focus ring</span><span class="mono" style="font-size:9px; color:#777;">#3d3d3d</span></div>
  </div>
  <div style="margin-top:12px; font-size:10px; color:#777;">Borders define sections; shadows reserved for overlays.</div>
</div></body></html>
